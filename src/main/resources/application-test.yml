spring:
  mvc:
    throw-exception-if-no-handler-found: true
  web:
    resources:
      add-mappings: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  datasource:
    url: jdbc:postgresql://localhost:5433/storeflow_rest_api
    driver-class-name: org.postgresql.Driver
    username: storeflow_user
    password: storeflow_test_password
  flyway:
    enabled: true
    locations: classpath:db/migration
  sql:
    init:
      mode: never
  mail:
    host: localhost
    port: 3025
    protocol: smtp
    default-encoding: UTF-8

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    com.storeflow: DEBUG
    org.springframework: WARN
    org.hibernate: WARN

app:
  jwt:
    secret: test-secret-key-DO-NOT-USE-IN-PRODUCTION
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  storage:
    base-path: /tmp/uploads
  email:
    from: test@storeflow.local
