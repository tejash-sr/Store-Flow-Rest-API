spring:
  mvc:
    throw-exception-if-no-handler-found: true
    dispatch-options-request: false
  web:
    resources:
      add-mappings: false
  datasource:
    url: jdbc:postgresql://localhost:5432/placeholder
    username: placeholder
    password: placeholder
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  flyway:
    enabled: false
  sql:
    init:
      mode: never
  mail:
    host: localhost
    port: 3025
    protocol: smtp

management:
  endpoints:
    web:
      exposure:
        include: health,metrics
  endpoint:
    health:
      show-details: always
  health:
    db:
      enabled: false
    mail:
      enabled: false

app:
  jwt:
    secret: test-secret-key-DO-NOT-USE-IN-PRODUCTION
    expiration-ms: 900000
    refresh-expiration-ms: 604800000
  storage:
    base-path: /tmp/uploads
  email:
    from: test@storeflow.local
