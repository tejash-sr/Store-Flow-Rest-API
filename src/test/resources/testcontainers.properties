# Testcontainers Configuration for StoreFlow API
# Auto-detects Docker socket and configures container management

# Docker client strategy - use default detection first
# Will auto-detect Unix socket, DOCKER_HOST env var, or Docker settings
docker.client.strategy=

# Container cleanup - disable reuse for test isolation
testcontainers.reuse.enable=false

# Ryuk container - handles resource cleanup
ryuk.enabled=true
ryuk.verbose=false

# Logging level
testcontainers.debug=false

