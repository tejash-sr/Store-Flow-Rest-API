$kind: http-request
name: 'GET /api/nonexistent – 404 Not Found'
method: GET
url: '{{base_url}}/api/nonexistent'
order: 2000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ===== STATUS CODE VALIDATION =====
      pm.test("Status code is 404", function () {
          pm.response.to.have.status(404);
      });

      // ===== PERFORMANCE VALIDATION =====
      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // ===== CONTENT-TYPE VALIDATION =====
      pm.test("Content-Type header is application/json", function () {
          pm.response.to.have.header("Content-Type");
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      // ===== RESPONSE BODY IS VALID JSON =====
      pm.test("Response body is valid JSON", function () {
          pm.response.to.be.json;
      });

      const jsonData = pm.response.json();

      // ===== TIMESTAMP FIELD VALIDATIONS =====
      pm.test("Response has 'timestamp' field", function () {
          pm.expect(jsonData).to.have.property("timestamp");
      });

      pm.test("'timestamp' is a non-empty string", function () {
          pm.expect(jsonData.timestamp).to.be.a("string");
          pm.expect(jsonData.timestamp.length).to.be.greaterThan(0);
      });

      pm.test("'timestamp' is valid ISO 8601 format (contains 'T')", function () {
          pm.expect(jsonData.timestamp).to.include("T");
      });

      pm.test("'timestamp' parses as a valid Date", function () {
          const parsed = new Date(jsonData.timestamp);
          pm.expect(parsed.toString()).to.not.eql("Invalid Date");
      });

      pm.test("'timestamp' is a string type (not number)", function () {
          pm.expect(jsonData.timestamp).to.be.a("string");
      });

      // ===== STATUS FIELD VALIDATIONS =====
      pm.test("Response has 'status' field", function () {
          pm.expect(jsonData).to.have.property("status");
      });

      pm.test("'status' field equals 404 (number)", function () {
          pm.expect(jsonData.status).to.eql(404);
      });

      pm.test("'status' field is a number type", function () {
          pm.expect(jsonData.status).to.be.a("number");
      });

      // ===== ERROR FIELD VALIDATIONS =====
      pm.test("Response has 'error' field", function () {
          pm.expect(jsonData).to.have.property("error");
      });

      pm.test("'error' field equals 'Not Found'", function () {
          pm.expect(jsonData.error).to.eql("Not Found");
      });

      // ===== MESSAGE FIELD VALIDATIONS =====
      pm.test("Response has 'message' field", function () {
          pm.expect(jsonData).to.have.property("message");
      });

      pm.test("'message' field equals 'Resource not found'", function () {
          pm.expect(jsonData.message).to.eql("Resource not found");
      });

      pm.test("'message' field contains 'Resource not found'", function () {
          pm.expect(jsonData.message).to.include("Resource not found");
      });

      // ===== PATH FIELD VALIDATIONS =====
      pm.test("Response has 'path' field", function () {
          pm.expect(jsonData).to.have.property("path");
      });

      pm.test("'path' contains '/api/nonexistent'", function () {
          pm.expect(jsonData.path).to.include("/api/nonexistent");
      });

      pm.test("'path' is a string", function () {
          pm.expect(jsonData.path).to.be.a("string");
      });

      // ===== NEGATIVE VALIDATIONS (JsonInclude NON_NULL) =====
      pm.test("Response does NOT contain 'fieldErrors' (JsonInclude NON_NULL)", function () {
          pm.expect(jsonData).to.not.have.property("fieldErrors");
      });

      // ===== STRUCTURE VALIDATION =====
      pm.test("Response body has exactly 5 keys (timestamp, status, error, message, path)", function () {
          const keys = Object.keys(jsonData);
          pm.expect(keys.length).to.eql(5);
          pm.expect(keys).to.include.members(["timestamp", "status", "error", "message", "path"]);
      });

      // ===== ERROR RESPONSE COMPLETENESS (mirrors GlobalExceptionHandlerIntegrationTest) =====
      pm.test("Error response includes all required fields: status, error, message, timestamp, path", function () {
          pm.expect(jsonData).to.have.property("status");
          pm.expect(jsonData).to.have.property("error");
          pm.expect(jsonData).to.have.property("message");
          pm.expect(jsonData).to.have.property("timestamp");
          pm.expect(jsonData).to.have.property("path");
      });

      // ===== X-TRACE-ID HEADER (from RequestLoggingFilter) =====
      pm.test("Response includes X-Trace-Id header", function () {
          pm.response.to.have.header("X-Trace-Id");
      });

      pm.test("X-Trace-Id header is a valid UUID format", function () {
          const traceId = pm.response.headers.get("X-Trace-Id");
          pm.expect(traceId).to.match(/^[0-9a-f\-]+$/);
      });
examples: './.resources/GET_api_nonexistent.resources/examples'
