$kind: http-example
name: '404 Not Found – Invalid Route'
request:
  url: 'http://localhost:8080/api/nonexistent'
  method: GET
response:
  statusCode: 404
  statusText: Not Found
  headers:
    - key: Content-Type
      value: application/json
    - key: X-Trace-Id
      value: 'c3d4e5f6-a7b8-9012-cdef-123456789012'
  body:
    type: json
    content: |-
      {
        "timestamp": "2025-04-06T18:31:00.456789Z",
        "status": 404,
        "error": "Not Found",
        "message": "Resource not found",
        "path": "/api/nonexistent"
      }
