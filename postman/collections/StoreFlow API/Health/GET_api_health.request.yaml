$kind: http-request
name: 'GET /api/health'
method: GET
url: '{{base_url}}/api/health'
order: 1000
headers:
  - key: Accept
    value: application/json
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      // ===== STATUS CODE VALIDATION =====
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });

      // ===== PERFORMANCE VALIDATION =====
      pm.test("Response time is below 2000ms", function () {
          pm.expect(pm.response.responseTime).to.be.below(2000);
      });

      // ===== CONTENT-TYPE VALIDATION =====
      pm.test("Content-Type header is application/json", function () {
          pm.response.to.have.header("Content-Type");
          pm.expect(pm.response.headers.get("Content-Type")).to.include("application/json");
      });

      // ===== RESPONSE BODY IS VALID JSON =====
      pm.test("Response body is valid JSON", function () {
          pm.response.to.be.json;
      });

      const jsonData = pm.response.json();

      // ===== STATUS FIELD VALIDATIONS =====
      pm.test("Response has 'status' field", function () {
          pm.expect(jsonData).to.have.property("status");
      });

      pm.test("'status' field equals 'UP'", function () {
          pm.expect(jsonData.status).to.eql("UP");
      });

      // ===== TIMESTAMP FIELD VALIDATIONS =====
      pm.test("Response has 'timestamp' field", function () {
          pm.expect(jsonData).to.have.property("timestamp");
      });

      pm.test("'timestamp' is a non-empty string", function () {
          pm.expect(jsonData.timestamp).to.be.a("string");
          pm.expect(jsonData.timestamp.length).to.be.greaterThan(0);
      });

      pm.test("'timestamp' is valid ISO 8601 format (contains 'T' and 'Z')", function () {
          pm.expect(jsonData.timestamp).to.include("T");
          pm.expect(jsonData.timestamp).to.include("Z");
      });

      pm.test("'timestamp' parses as a valid Date", function () {
          const parsed = new Date(jsonData.timestamp);
          pm.expect(parsed.toString()).to.not.eql("Invalid Date");
      });

      // ===== JVM UPTIME FIELD VALIDATIONS =====
      pm.test("Response has 'jvmUptimeMs' field", function () {
          pm.expect(jsonData).to.have.property("jvmUptimeMs");
      });

      pm.test("'jvmUptimeMs' is a number", function () {
          pm.expect(jsonData.jvmUptimeMs).to.be.a("number");
      });

      pm.test("'jvmUptimeMs' is greater than 0", function () {
          pm.expect(jsonData.jvmUptimeMs).to.be.greaterThan(0);
      });

      // ===== NEGATIVE VALIDATIONS (no error fields in success response) =====
      pm.test("Response does NOT contain 'error' field", function () {
          pm.expect(jsonData).to.not.have.property("error");
      });

      pm.test("Response does NOT contain 'message' field", function () {
          pm.expect(jsonData).to.not.have.property("message");
      });

      pm.test("Response does NOT contain 'fieldErrors' field", function () {
          pm.expect(jsonData).to.not.have.property("fieldErrors");
      });

      pm.test("Response does NOT contain 'path' field", function () {
          pm.expect(jsonData).to.not.have.property("path");
      });

      // ===== STRUCTURE VALIDATION =====
      pm.test("Response body has exactly 3 keys (status, timestamp, jvmUptimeMs)", function () {
          const keys = Object.keys(jsonData);
          pm.expect(keys.length).to.eql(3);
          pm.expect(keys).to.include.members(["status", "timestamp", "jvmUptimeMs"]);
      });

      // ===== X-TRACE-ID HEADER (from RequestLoggingFilter) =====
      pm.test("Response includes X-Trace-Id header", function () {
          pm.response.to.have.header("X-Trace-Id");
      });

      pm.test("X-Trace-Id header is a valid UUID format", function () {
          const traceId = pm.response.headers.get("X-Trace-Id");
          pm.expect(traceId).to.match(/^[0-9a-f\-]+$/);
      });

      // ===== CORS HEADER VALIDATION =====
      pm.test("Response includes Access-Control-Allow-Origin header when Origin is sent", function () {
          // Note: This test validates CORS is configured. 
          // The header may only appear when an Origin header is sent in the request.
          // If running without Origin header, this test documents expected CORS behavior.
          const acaoHeader = pm.response.headers.get("Access-Control-Allow-Origin");
          if (acaoHeader) {
              pm.expect(acaoHeader).to.be.a("string");
          }
      });

      // ===== HEALTH ENDPOINT IS PUBLICLY ACCESSIBLE =====
      pm.test("Health endpoint is publicly accessible (no 401/403)", function () {
          pm.expect(pm.response.code).to.not.eql(401);
          pm.expect(pm.response.code).to.not.eql(403);
      });
examples: './.resources/GET_api_health.resources/examples'
