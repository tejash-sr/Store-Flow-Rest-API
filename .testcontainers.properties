# Testcontainers Configuration for Docker Desktop on Windows with WSL2

# Use Docker Desktop (connect via Docker socket on WSL2)
docker.client.strategy=org.testcontainers.dockerclient.DockerClientConfigStrategy

# Container labels to identify test containers
testcontainers.container.label.env=storeflow-rest-api-phase1-tests

# Timeout for container operations (60 seconds = more time for slow machines)
docker.client.strategy.timeout.seconds=60

# Enable logging for debugging
testcontainers.debug=false

# Reuse containers across test runs (optional - comment out to always create fresh)
testcontainers.reuse.enable=false

# Custom docker host socket (for WSL2 on Windows)
docker.host=unix:///var/run/docker.sock
