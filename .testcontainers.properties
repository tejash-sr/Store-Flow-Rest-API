# Testcontainers Configuration for Docker Desktop on Windows with WSL2

# Force Windows Docker Desktop provider strategy
testcontainers.docker.client.strategy=DockerDesktopClientProvider

# Increase timeout for container operations
testcontainers.docker.client.strategy.timeout.seconds=90

# Disable ryuk (resource cleanup sidecar that may conflict on Windows)
testcontainers.ryuk.disabled=false

# Container labels to identify test containers
testcontainers.container.label=storeflow-rest-api-tests

# Reuse containers (disabled for clean test state)
testcontainers.reuse.enable=false

# Enable verbose logging
testcontainers.debug=false
